// ============ STATE ============
let state = { tasks: null, notes: {}, expanded: null, filter: "all", activeSection: null, showAdd: false };

// ============ FIREBASE SYNC ============
const DOC_REF = db.collection("app").doc("state");

async function loadFromFirebase() {
  try {
    const doc = await DOC_REF.get();
    if (doc.exists) {
      const data = doc.data();
      state.tasks = data.tasks || INITIAL_TASKS;
      state.notes = data.notes || {};
    } else {
      state.tasks = INITIAL_TASKS;
      state.notes = {};
      await saveToFirebase();
    }
  } catch(e) {
    console.error("Firebase load error:", e);
    state.tasks = INITIAL_TASKS;
    state.notes = {};
  }
  document.getElementById("loading").style.display = "none";
  document.getElementById("app").style.display = "block";
  render();
  // Listen for real-time updates
  DOC_REF.onSnapshot(doc => {
    if (doc.exists) {
      const data = doc.data();
      state.tasks = data.tasks || INITIAL_TASKS;
      state.notes = data.notes || {};
      render();
    }
  });
}

async function saveToFirebase() {
  try {
    await DOC_REF.set({ tasks: state.tasks, notes: state.notes });
  } catch(e) { console.error("Firebase save error:", e); }
}

// ============ HELPERS ============
function formatDate(dateStr) {
  const d = new Date(dateStr + "T12:00:00");
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.ceil((d - now) / 86400000);
  const month = d.toLocaleString("en-US",{month:"short"});
  const day = d.getDate();
  if(diff<0) return {label:`${month} ${day}`,tagText:"OVERDUE",tagBg:"#FEE2E2",tagColor:"#DC2626"};
  if(diff===0) return {label:`${month} ${day}`,tagText:"TODAY",tagBg:"#FFE0EC",tagColor:"#E8437F"};
  if(diff===1) return {label:`${month} ${day}`,tagText:"TOMORROW",tagBg:"#FFF3E0",tagColor:"#E65100"};
  if(diff<=3) return {label:`${month} ${day}`,tagText:`${diff} days`,tagBg:"#FFF8E1",tagColor:"#F57F17"};
  if(diff<=7) return {label:`${month} ${day}`,tagText:`${diff} days`,tagBg:"#E8F5E9",tagColor:"#2E7D32"};
  return {label:`${month} ${day}`,tagText:`${diff}d`,tagBg:"#F3F4F6",tagColor:"#6B7280"};
}

const confettiColors=["#FF6B9D","#A78BFA","#34D399","#FBBF24","#38BDF8","#F472B6","#FB923C","#FFD700"];
function boom() {
  const c = document.getElementById("confetti-container");
  for(let i=0;i<28;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    const sz=6+Math.random()*10;
    el.style.cssText=`left:${15+Math.random()*70}%;width:${sz}px;height:${sz}px;background:${confettiColors[i%confettiColors.length]};border-radius:${Math.random()>.5?"50%":"3px"};animation-delay:${Math.random()*.4}s;--dr:${(Math.random()-.5)*90}px`;
    c.appendChild(el);
    setTimeout(()=>el.remove(),2000);
  }
}

// ============ ACTIONS ============
function toggleItem(catId, itemId) {
  const cat = state.tasks.find(c=>c.id===catId);
  const item = cat?.items.find(i=>i.id===itemId);
  if(!item) return;
  const wasDone = item.done;
  item.done = !item.done;
  if(!wasDone) boom();
  saveToFirebase();
  render();
}

function toggleExpand(itemId) {
  state.expanded = state.expanded===itemId ? null : itemId;
  render();
}

function setFilter(f) { state.filter=f; render(); }
function setActiveSection(id) { state.activeSection = state.activeSection===id ? null : id; render(); }

function updateNote(itemId, value) {
  state.notes[itemId] = value;
  // Debounced save
  clearTimeout(updateNote._timer);
  updateNote._timer = setTimeout(()=>saveToFirebase(), 800);
}

function toggleAddForm() { state.showAdd=!state.showAdd; render(); }

  const deadline=document.getElementById("add-deadline").value;
  const costVal=document.getElementById("add-cost").value.trim();
  const cost=costVal===""?null:Number(costVal)||0;
  if(!cat||!text) return;
  const c=state.tasks.find(t=>t.id===cat);
  if(!c) return;
  c.items.push({id:`x-${Date.now()}`,text,detail,deadline:deadline||null,cost,done:false});
  state.showAdd=false;
  saveToFirebase();
  render();
}

function resetAll() {
  if(!confirm("Start completely fresh? This clears all progress and notes.")) return;
  state.tasks=JSON.parse(JSON.stringify(INITIAL_TASKS));
  state.notes={};
  saveToFirebase();
  render();
}

// ============ RENDER ============
function render() {
  const tasks = state.tasks;
  if(!tasks) return;

  const total=tasks.reduce((a,c)=>a+c.items.length,0);
  const done=tasks.reduce((a,c)=>a+c.items.filter(i=>i.done).length,0);
  const pct=total?Math.round((done/total)*100):0;
  const budget=tasks.reduce((a,c)=>a+c.items.filter(i=>!i.done).reduce((b,i)=>b+(i.cost||0),0),0);
  const tbdCount=tasks.reduce((a,c)=>a+c.items.filter(i=>!i.done&&i.cost===null).length,0);
  const urgentCount=tasks.reduce((a,c)=>a+c.items.filter(i=>i.urgent&&!i.done).length,0);

  const headlines=[
    [0,"Let's get this show on the road!"],[20,"Just getting started \u2014 you got this!"],[40,"Making moves! Keep checking things off!"],
    [60,"Halfway there, queen! \ud83d\udc51"],[80,"On a roll! The finish line is in sight!"],[100,"Almost done \u2014 finish strong! \ud83d\udcaa"],[101,"YOU DID IT ALL! \ud83c\udf89\ud83c\udf89\ud83c\udf89"]
  ];
  let hl=headlines[0][1]; for(const[t,m] of headlines){ if(pct>=t) hl=m; }
  if(pct===100) hl=headlines[headlines.length-1][1];

  let filtered=tasks;
  if(state.filter==="done") filtered=tasks.map(c=>({...c,items:c.items.filter(i=>i.done)})).filter(c=>c.items.length);
  else if(state.filter==="todo") filtered=tasks.map(c=>({...c,items:c.items.filter(i=>!i.done)})).filter(c=>c.items.length);
  if(state.activeSection) filtered=filtered.filter(c=>c.id===state.activeSection);

  let html = `
  <!-- HERO -->
  <div style="background:linear-gradient(135deg,#FF6B9D 0%,#A78BFA 30%,#38BDF8 60%,#34D399 100%);background-size:200% 200%;animation:gradientShift 8s ease infinite;padding:44px 24px 36px;border-radius:0 0 32px 32px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-30px;right:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.1)"></div>
    <div style="position:absolute;bottom:-20px;left:-10px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.08)"></div>
    <div style="position:absolute;top:20px;left:30px;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06)"></div>
    <div style="position:relative;z-index:1">
      <div style="font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.8);text-transform:uppercase;font-weight:600;margin-bottom:6px">Class of 2026 \u00b7 Bancroft</div>
      <h1 style="font-family:'Outfit',sans-serif;font-size:36px;font-weight:900;color:#fff;line-height:1.05;margin-bottom:6px">Anyah's Senior Year HQ</h1>
      <p style="color:rgba(255,255,255,.85);font-size:14px;font-weight:500">${escHtml(hl)}</p>
    </div>
    <div style="display:flex;gap:10px;margin-top:22px;position:relative;z-index:1">
      ${[{v:`${pct}%`,l:"Complete"},{v:total-done,l:"To Do"},{v:`$${budget}`,l:"Known Costs"},{v:tbdCount,l:"TBD $$$"}].map(s=>`
        <div style="flex:1;background:rgba(255,255,255,.2);backdrop-filter:blur(10px);border-radius:16px;padding:12px 6px;text-align:center">
          <div style="font-size:20px;font-weight:900;color:#fff;font-family:'Outfit',sans-serif">${s.v}</div>
          <div style="font-size:9px;color:rgba(255,255,255,.75);font-weight:600;line-height:1.2">${s.l}</div>
        </div>`).join("")}
    </div>
    <div style="margin-top:14px;background:rgba(255,255,255,.2);border-radius:100px;height:8px;overflow:hidden;position:relative;z-index:1">
      <div style="height:100%;border-radius:100px;background:#fff;width:${pct}%;transition:width .5s ease"></div>
    </div>
  </div>

  <div style="padding:0 16px">`;

  // Urgent banner
  if(urgentCount>0){
    html+=`<div style="margin-top:16px;padding:14px 18px;border-radius:16px;background:linear-gradient(135deg,#FFF0F3,#FFE4EC);border:1.5px solid #FFCCD5;display:flex;align-items:center;gap:12px;animation:pulseGlow 2s infinite">
      <span style="font-size:24px;animation:floatEmoji 2s ease-in-out infinite">\ud83d\udea8</span>
      <div><div style="font-weight:700;font-size:14px;color:#BE123C">${urgentCount} urgent item${urgentCount>1?"s":""} need your attention!</div>
      <div style="font-size:12px;color:#E11D48;margin-top:2px">Handle these before anything else</div></div></div>`;
  }

  // Category pills
  html+=`<div style="display:flex;gap:8px;overflow-x:auto;padding:16px 0 12px;-webkit-overflow-scrolling:touch">
    <button class="cat-pill" onclick="setActiveSection(null)" style="min-width:56px;padding:8px 14px;border-radius:14px;background:${state.activeSection===null?"linear-gradient(135deg,#A78BFA,#818CF8)":"#fff"};box-shadow:${state.activeSection===null?"0 4px 16px rgba(167,139,250,.3)":"0 1px 6px rgba(0,0,0,.05)"}">
      <div style="font-size:11px;font-weight:700;color:${state.activeSection===null?"#fff":"#555"}">All</div>
    </button>`;
  tasks.forEach(cat=>{
    const d=cat.items.filter(i=>i.done).length, t=cat.items.length, a=state.activeSection===cat.id;
    html+=`<button class="cat-pill" onclick="setActiveSection('${cat.id}')" style="min-width:80px;padding:8px 12px;border-radius:14px;background:${a?cat.gradient:"#fff"};box-shadow:${a?`0 4px 16px ${cat.accent}33`:"0 1px 6px rgba(0,0,0,.05)"}">
      <div style="font-size:18px;margin-bottom:1px">${cat.emoji}</div>
      <div style="font-size:9px;font-weight:700;color:${a?"#fff":"#555"};line-height:1.2">${escHtml(cat.category.replace(/\s*✨$/,""))}</div>
      <div style="font-size:9px;font-weight:600;margin-top:2px;color:${a?"rgba(255,255,255,.8)":"#CCC"}">${d}/${t}</div>
    </button>`;
  });
  html+=`</div>`;

  // Filters
  html+=`<div style="display:flex;gap:6px;padding-bottom:12px">`;
  [["all","All"],["todo","To Do"],["done","Done \u2713"]].forEach(([k,l])=>{
    html+=`<button class="filter-btn" onclick="setFilter('${k}')" style="padding:6px 16px;border-radius:100px;background:${state.filter===k?"#1E293B":"#F1F5F9"};color:${state.filter===k?"#fff":"#94A3B8"};font-size:12px;font-weight:600">${l}</button>`;
  });
  html+=`<button class="filter-btn" onclick="resetAll()" style="padding:6px 12px;border-radius:100px;background:transparent;color:#D1D5DB;font-size:11px;margin-left:auto">\u21ba Reset</button></div>`;

  // Sections
  filtered.forEach((cat,ci)=>{
    html+=`<div style="margin-bottom:28px;animation:slideUp .3s ease ${ci*.04}s both">`;
    // Section header
    html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:10px 14px;background:${cat.bg};border-radius:18px">
      <div style="width:42px;height:42px;border-radius:14px;background:${cat.gradient};display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 12px ${cat.accent}22;flex-shrink:0">${cat.emoji}</div>
      <div style="flex:1;min-width:0"><h2 style="font-size:17px;font-weight:800;font-family:'Outfit',sans-serif;color:#1a1a2e">${escHtml(cat.category)}</h2>
      ${cat.date?`<div style="font-size:11px;color:#888;font-weight:500;margin-top:1px">${escHtml(cat.date)}</div>`:""}</div>
      <div style="font-size:12px;font-weight:700;color:${cat.accent};background:#fff;padding:4px 12px;border-radius:100px;flex-shrink:0">${cat.items.filter(i=>i.done).length}/${cat.items.length}</div>
    </div>`;

    // Items
    cat.items.forEach(item=>{
      const exp=state.expanded===item.id;
      const di=item.deadline?formatDate(item.deadline):null;
      const cost=item.cost===null?"\ud83d\udcb2TBD":item.cost===0?null:`$${item.cost}`;
      html+=`<div class="item-card" onclick="toggleExpand('${item.id}')" style="background:${item.done?"#F0FFF4":"#fff"};border-radius:18px;padding:14px 16px;margin-bottom:8px;border:1.5px solid ${item.done?"#BBF7D0":item.urgent&&!item.done?"#FFCCD5":"#F0F0F5"};${item.urgent&&!item.done?"animation:pulseGlow 2.5s infinite;":""};box-shadow:${item.done?"none":"0 1px 4px rgba(0,0,0,.03)"}">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <button onclick="event.stopPropagation();toggleItem('${cat.id}','${item.id}')" style="width:26px;height:26px;min-width:26px;border-radius:9px;border:2.5px solid ${item.done?"#34D399":cat.accent+"55"};background:${item.done?"linear-gradient(135deg,#34D399,#10B981)":"#fff"};cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .2s;box-shadow:${item.done?"0 2px 8px rgba(52,211,153,.3)":"none"}">
            ${item.done?`<span style="color:#fff;font-size:13px;font-weight:800">\u2713</span>`:""}
          </button>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;line-height:1.4;text-decoration:${item.done?"line-through":"none"};color:${item.done?"#94A3B8":"#1E293B"}">
              ${escHtml(item.text)}
              ${item.urgent&&!item.done?`<span style="display:inline-block;margin-left:8px;font-size:10px;background:linear-gradient(135deg,#FF6B9D,#FF8E53);color:#fff;padding:2px 10px;border-radius:100px;font-weight:700;vertical-align:middle">NOW!</span>`:""}
            </div>
            <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
              ${di?`<span style="font-size:11px;padding:2px 10px;border-radius:8px;font-weight:600;background:${di.tagBg};color:${di.tagColor}">${di.label} \u00b7 ${di.tagText}</span>`:""}
              ${cost?`<span style="font-size:11px;padding:2px 10px;border-radius:8px;background:${cost==="\ud83d\udcb2TBD"?"#FFF8E1":"#F8FAFC"};color:${cost==="\ud83d\udcb2TBD"?"#D97706":"#64748B"};font-weight:600;border:1px solid ${cost==="\ud83d\udcb2TBD"?"#FDE68A":"#E2E8F0"}">${cost}</span>`:""}
            </div>
          </div>
          <span style="font-size:14px;color:#CBD5E1;transition:transform .2s;margin-top:4px;transform:${exp?"rotate(180deg)":"rotate(0)"};display:inline-block">\u25be</span>
        </div>`;

      if(exp){
        html+=`<div style="margin-top:12px;padding-left:38px;animation:slideUp .15s ease" onclick="event.stopPropagation()">`;
        if(item.detail){
          html+=`<p class="detail-text" style="font-size:13px;color:#64748B;line-height:1.6;margin-bottom:10px;background:${cat.bg};padding:12px 14px;border-radius:12px;border-left:3px solid ${cat.accent}">${escHtml(item.detail)}</p>`;
        }
        html+=`<textarea class="note-input" placeholder="Add a personal note..." oninput="updateNote('${item.id}',this.value)" style="width:100%;min-height:52px;padding:10px;border-radius:12px;border:1.5px solid #E2E8F0;background:#FAFBFF;color:#334155;font-size:13px;resize:vertical">${escHtml(state.notes[item.id]||"")}</textarea>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
  });

  // Add task
  if(state.showAdd){
    html+=`<div style="background:#fff;border-radius:24px;padding:22px;margin-bottom:24px;border:1.5px solid #E2E8F0;box-shadow:0 4px 16px rgba(0,0,0,.06);animation:slideUp .2s ease">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3 style="font-size:16px;font-weight:800;font-family:'Outfit',sans-serif">Add a Task \u270d\ufe0f</h3>
        <button onclick="toggleAddForm()" style="background:#F1F5F9;border:none;color:#94A3B8;font-size:14px;width:28px;height:28px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center">\u2715</button>
      </div>
      <select id="add-cat" style="width:100%;padding:11px;border-radius:14px;margin-bottom:8px;background:#F8FAFC;border:1.5px solid #E2E8F0;color:#334155;font-size:13px;font-family:'DM Sans',sans-serif">
        <option value="">Pick a category...</option>
        ${tasks.map(c=>`<option value="${c.id}">${c.emoji} ${escHtml(c.category)}</option>`).join("")}
      </select>
      <input id="add-text" placeholder="What needs to get done?" style="width:100%;padding:11px;border-radius:14px;margin-bottom:8px;background:#F8FAFC;border:1.5px solid #E2E8F0;color:#334155;font-size:13px;font-family:'DM Sans',sans-serif">
      <input id="add-detail" placeholder="Details (optional)" style="width:100%;padding:11px;border-radius:14px;margin-bottom:8px;background:#F8FAFC;border:1.5px solid #E2E8F0;color:#334155;font-size:13px;font-family:'DM Sans',sans-serif">
      <div style="display:flex;gap:8px;margin-bottom:14px">
        <input id="add-cost" type="number" min="0" placeholder="Cost $ (optional)" style="flex:1;padding:11px;border-radius:14px;background:#F8FAFC;border:1.5px solid #E2E8F0;color:#334155;font-size:13px;font-family:'DM Sans',sans-serif">
        <input id="add-deadline" type="date" style="flex:1;padding:11px;border-radius:14px;background:#F8FAFC;border:1.5px solid #E2E8F0;color:#334155;font-size:13px;font-family:'DM Sans',sans-serif">
      </div>
      <button onclick="addTask()" style="width:100%;padding:13px;border-radius:14px;border:none;background:linear-gradient(135deg,#A78BFA,#818CF8);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(167,139,250,.3)">Add It! \u2728</button>
    </div>`;
  } else {
    html+=`<button onclick="toggleAddForm()" style="width:100%;padding:14px;border-radius:18px;border:2px dashed #E2E8F0;background:#fff;color:#94A3B8;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:24px;font-family:'DM Sans',sans-serif">+ Add a task</button>`;
  }

  // Footer
  html+=`<div style="text-align:center;padding:20px 0 48px">
    <div style="font-size:13px;color:#CBD5E1;font-weight:500">Built with love by Dad \ud83d\udcaa</div>
    <div style="font-size:11px;color:#E2E8F0;margin-top:4px">You got this, future NP! \ud83e\ude7a</div>
  </div></div>`;

  document.getElementById("app").innerHTML = html;
}

// ============ INIT ============
loadFromFirebase();
</script>
</body>
</html>
